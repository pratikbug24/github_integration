  #     - ./src:/app/src
  #     - ./public:/app/public
  #     - ./package.json:/app/package.json
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:3000
  #   depends_on:
  #     - api
